version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pos_restaurant_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pos_restaurant
      POSTGRES_USER: pos_admin
      POSTGRES_PASSWORD: pos_secure_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_admin -d pos_restaurant"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pos_restaurant_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pos_restaurant
      DB_USER: pos_admin
      DB_PASSWORD: pos_secure_2024
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pos_restaurant_web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
